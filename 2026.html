<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>2026 Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
background: radial-gradient(circle at top,#edebf0,#cbc4db);
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins',sans-serif;
overflow:hidden;
}


.wrapper{
  width:640px;
  height:420px;
  clip-path: stars(
    20% 5%, 80% 5%,
    95% 20%, 98% 50%,
    95% 80%, 80% 95%,
    20% 95%, 5% 80%,
    2% 50%, 5% 20%
  );
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(10px);
  box-shadow:
    0 0 80px rgba(116,80,155,0.7),
    inset 0 0 40px rgba(255,255,255,0.2);
  padding:10px;
}

canvas{
  width:100%;
  height:100%;
  border-radius:14px;
}

</style>
</head>

<body>

<div class="wrapper">
<canvas id="canvas" width="640" height="420"></canvas>
</div>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let glow=0, glowDir=1;


const particles=[...Array(90)].map(()=>({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
vx:(Math.random()-.5)*.5,
vy:(Math.random()-.5)*.5
}));

/* Floating Orbs */
const orbs=[...Array(10)].map(()=>({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*30+20,
a:Math.random()*0.15+0.05
}));

const stars=[...Array(6)].map(()=>resetStar());

function resetStar(){
return{
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height/2,
  vx:Math.random()*4+3,
  vy:Math.random()*2+1,
  life:Math.random()*100+80
}
}

function drawBackground(){
const g=ctx.createLinearGradient(0,0,canvas.width,canvas.height);
g.addColorStop(0,"#2d0066");
g.addColorStop(1,"#07001a");
ctx.fillStyle=g;
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="rgba(0,0,0,0.25)";
ctx.fillRect(0,0,canvas.width,canvas.height);
}

function drawOrbs(){
orbs.forEach(o=>{
  ctx.beginPath();
  ctx.arc(o.x,o.y,o.r,0,Math.PI*2);
  ctx.fillStyle=`rgba(180,120,255,${o.a})`;
  ctx.fill();
  o.x+=Math.sin(Date.now()/2000)*0.2;
});
}

function drawParticles(){
particles.forEach(p=>{
  ctx.beginPath();
  ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
  ctx.fillStyle="rgba(255,255,255,.6)";
  ctx.fill();
  p.x+=p.vx;
  p.y+=p.vy;
  if(p.x<0||p.x>canvas.width)p.vx*=-1;
  if(p.y<0||p.y>canvas.height)p.vy*=-1;
});
}

function drawRing(){
glow+=0.4*glowDir;
if(glow>25||glow<0)glowDir*=-1;

ctx.beginPath();
ctx.arc(canvas.width/2,canvas.height/2,120,0,Math.PI*2);
ctx.strokeStyle=`rgba(200,140,255,${0.5+glow/60})`;
ctx.lineWidth=5;
ctx.shadowBlur=35;
ctx.shadowColor="#cfa6ff";
ctx.stroke();
ctx.shadowBlur=0;
}

function drawText(){
ctx.textAlign="center";

ctx.font="700 96px Orbitron";
ctx.fillStyle="#f3d7ff";
ctx.shadowBlur=40;
ctx.shadowColor="#d18bff";
ctx.fillText("2026",canvas.width/2,canvas.height/2+25);

ctx.font="300 18px Poppins";
ctx.fillStyle="#e8d9ff";
ctx.shadowBlur=0;
ctx.fillText("The Next Chapter Starts",canvas.width/2,canvas.height/2+65);
}

function drawStars(){
stars.forEach(s=>{
  ctx.beginPath();
  ctx.moveTo(s.x,s.y);
  ctx.lineTo(s.x-s.vx*6,s.y-s.vy*6);
  ctx.strokeStyle="rgba(255,255,255,.8)";
  ctx.lineWidth=2;
  ctx.stroke();

  s.x+=s.vx;
  s.y+=s.vy;
  s.life--;
  if(s.life<=0||s.x>canvas.width||s.y>canvas.height){
  Object.assign(s,resetStar());
  }
});
}

function animate(){
drawBackground();
drawOrbs();
drawParticles();
drawRing();
drawStars();
drawText();
requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
